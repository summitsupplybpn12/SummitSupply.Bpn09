<!-- FONT PREMIUM -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #eef2f3;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #1b5e20, #2e7d32);
  color: white;
  padding: 40px 20px;
  text-align: center;
}

.header h1 {
  margin: 0;
  font-size: 32px;
  line-height: 1.3;
  font-weight: 600;
}

.header p {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
}

/* CONTAINER */
.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.95);
  padding: 20px;
  margin-top: 18px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  backdrop-filter: blur(6px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-4px);
}

/* DIVIDER */
.divider {
  height: 1px;
  background: #ddd;
  margin: 15px 0;
}

/* BUTTON */
.btn {
  display: block;
  margin-top: 10px;
  padding: 12px;
  background: linear-gradient(135deg, #25D366, #1ebe5d);
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: 500;
  transition: all 0.2s ease;
}

.btn:hover {
  transform: scale(1.03);
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.map-btn {
  background: linear-gradient(135deg, #1b5e20, #145a17);
}

/* TEXT */
h2 {
  margin-bottom: 8px;
  font-weight: 600;
}

p {
  margin: 4px 0;
  font-size: 14px;
}

/* MAP */
iframe {
  margin-top: 10px;
  border-radius: 12px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>Summit Supply<br>Balikpapan</h1>

</div>
